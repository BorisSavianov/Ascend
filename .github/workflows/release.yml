name: CI and Android Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  test:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Run tests
        run: npm test

  release-android:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android build tools
        run: |
          sdkmanager "build-tools;34.0.0"
          echo "$ANDROID_HOME/build-tools/34.0.0" >> $GITHUB_PATH

      - name: Install dependencies
        run: npm ci

      - name: Export release version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "APP_VERSION=$VERSION" >> "$GITHUB_ENV"
          CODE=$(node -e "const v=process.argv[1].replace(/^v/, ''); const m=v.match(/^(\\d+)\\.(\\d+)\\.(\\d+)$/); if (m) { const code = (Number(m[1]) * 10000) + (Number(m[2]) * 100) + Number(m[3]); console.log(code); } else { const n = Number(v); if (!Number.isInteger(n) || n <= 0) { throw new Error('Tag must be semver vX.Y.Z or numeric version code'); } console.log(n); }" "$GITHUB_REF_NAME")
          echo "APP_ANDROID_VERSION_CODE=$CODE" >> "$GITHUB_ENV"
          echo "EXPO_PUBLIC_GITHUB_OWNER=$GITHUB_REPOSITORY_OWNER" >> "$GITHUB_ENV"
          echo "EXPO_PUBLIC_GITHUB_REPO=${GITHUB_REPOSITORY#*/}" >> "$GITHUB_ENV"

      - name: Prebuild Android project
        run: npx expo prebuild --platform android --clean --no-install

      - name: Build release APK
        run: cd android && ./gradlew assembleRelease

      - name: Sign release APK
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          mkdir -p dist
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > dist/release.keystore
          APK_PATH="android/app/build/outputs/apk/release/app-release-unsigned.apk"
          SIGNED_APK="dist/Ascend.apk"
          zipalign -p -f 4 "$APK_PATH" "dist/aligned.apk"
          apksigner sign \
            --ks dist/release.keystore \
            --ks-pass pass:"$ANDROID_KEYSTORE_PASSWORD" \
            --key-pass pass:"$ANDROID_KEY_PASSWORD" \
            --ks-key-alias "$ANDROID_KEY_ALIAS" \
            --out "$SIGNED_APK" \
            "dist/aligned.apk"
          sha256sum "$SIGNED_APK" > "dist/Ascend.apk.sha256"

      - name: Build release notes
        run: |
          mkdir -p dist
          cat > dist/release-notes.md <<EOF
          <!-- ascend-update {"assetName":"Ascend.apk","checksumAssetName":"Ascend.apk.sha256","force":false} -->

          ## Release ${GITHUB_REF_NAME}

          - Built from GitHub Actions.
          - Official release asset for Android APK sideloading.
          EOF

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/Ascend.apk
            dist/Ascend.apk.sha256
          body_path: dist/release-notes.md
          prerelease: ${{ contains(github.ref_name, '-') }}
          draft: false
          generate_release_notes: false
